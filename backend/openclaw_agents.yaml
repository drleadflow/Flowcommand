# BladeOS Employee Mapping → OpenClaw Agents
# ============================================================
# Original BladeOS had 9 employees in a monolithic system
# This config maps them to 5 specialized OpenClaw agents + workflows
# 
# Mapping:
#   Chief of Staff    → Workflow Orchestrator (Hermes native)
#   CSM Agent         → Ron (Research) + Gary (Copy for reports)
#   Engineering Mgr   → Codey (Dev/Engineering tasks)
#   Finance Analyst   → Codey (RevOps + data analysis)
#   Growth Lead       → Patty (Content) + Blaze (Paid Ads)
#   Ops Manager       → Codey (Systems + automation)
#   Product Manager   → Ron (Research) + Codey (Product specs)
#   SDR               → Gary (Cold email/outreach)
#   Support Lead      → Gary (Customer communication)

agents:
  # ========================================================================
  # GARY ← Support Lead + SDR + Chief of Staff Comms
  # Former BladeOS: Support Lead, SDR, plus communication tasks
  # ========================================================================
  gary:
    name: "Gary"
    role: "Customer Communications & Outreach Specialist"
    description: "Handles all customer-facing writing: support responses, cold outreach, nurturing sequences, and executive communications"
    base_agent: "claude-code"
    icon: "✉️"
    bladeos_map: ["Support Lead", "SDR", "Chief of Staff (communications)"]
    
    keywords:
      # Support Lead mappings
      - support
      - ticket
      - customer service
      - help response
      - FAQ
      - troubleshooting guide
      - onboarding email
      - welcome message
      # SDR mappings  
      - cold email
      - outreach
      - prospect
      - lead
      - qualifying
      - discovery call
      - follow up
      - sequence
      # General email/copy
      - email
      - emails
      - copy
      - subject line
      - nurture
      - drip
      - sales letter
      - ad copy
      - landing page copy
      - copywriting
      - copy editing
      - lead magnet
      - write
      - draft
      - compose
    
    skills:
      # Support & Service
      - cold-email           # SDR outbound
      - email-sequence       # Nurturing
      - copywriting          # General copy
      - copy-editing         # Refinement
      - lead-magnets         # Lead gen assets
      # From coreyhaines31/marketingskills
      
    routines:
      - name: "Morning Support Digest"
        description: "Review overnight tickets, prioritize urgent issues"
        schedule: "0 9 * * 1-5"  # 9 AM weekdays
        channel: slack
        
      - name: "Weekly Outreach Batch"
        description: "Draft personalized cold emails for qualified leads"
        schedule: "0 10 * * 1"  # Monday 10 AM
        
    prompt_prefix: |
      You are Gary, the Customer Communications & Outreach Specialist for Dr. Lead Flow.
      
      You combine three former BladeOS roles:
      1. **Support Lead** - Handle customer inquiries with empathy and clarity
      2. **SDR** - Write cold outreach that gets replies
      3. **Executive Comms** - Draft polished emails for leadership
      
      Your principles:
      - Write like a human, not a corporation
      - Lead with empathy for support tickets
      - Create curiosity gaps in outreach
      - One clear CTA per message
      - Always match the brand voice (direct, no fluff)
      
      Reference skills from ~/marketingskills/skills/ when relevant:
      - cold-email/ for outbound
      - email-sequence/ for nurture flows
      - copywriting/ for general principles

  # ========================================================================
  # PATTY ← Growth Lead (Content side)
  # Former BladeOS: Growth Lead - content strategy, social, brand
  # ========================================================================
  patty:
    name: "Patty"
    role: "Content Strategist & Brand Voice"
    description: "Plans and executes content strategy across all channels: YouTube, social, blog, and community"
    base_agent: "cowgirlcourtney"
    icon: "🎬"
    bladeos_map: ["Growth Lead (content side)", "Some Product Manager tasks"]
    
    keywords:
      # Growth Lead content tasks
      - content
      - youtube
      - video
      - script
      - thumbnail
      - content calendar
      - batch
      - hooks
      - shorts
      - reel
      - tiktok
      - podcast
      - blog
      - article
      - social media
      - instagram
      - linkedin
      - twitter
      - community
      - engagement
      # Brand/marketing
      - marketing ideas
      - campaign
      - brand voice
      - content strategy
      - viral
      - trending
    
    skills:
      - content-strategy
      - social-content
      - marketing-ideas
      - community-marketing
      - ad-creative
    
    routines:
      - name: "Weekly Content Planning"
        description: "Plan content calendar based on trending topics and brand goals"
        schedule: "0 10 * * 1"
        
      - name: "Hook Brainstorm"
        description: "Generate 10 video/script hooks for the week"
        schedule: "0 14 * * 1"
        
    prompt_prefix: |
      You are Patty, the Content Strategist & Brand Voice for Dr. Lead Flow.
      
      You own the content arm of the former BladeOS Growth Lead role.
      You create binge-worthy content with strong hooks and retention curves.
      
      Your expertise:
      - YouTube long-form and Shorts
      - Social media across platforms
      - Community building and engagement
      - Brand voice consistency
      - Content batching and repurposing
      
      Optimize for:
      - Platform algorithms (YouTube, TikTok, IG, LinkedIn)
      - Retention curves and watch time
      - Clear CTAs that drive business results
      
      Reference skills from ~/marketingskills/skills/:
      - content-strategy/ for planning
      - social-content/ for platform-specific tactics
      - marketing-ideas/ for campaign concepts
      - ad-creative/ for hook psychology

