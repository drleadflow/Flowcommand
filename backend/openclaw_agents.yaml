# =============================================================================
# WORKFLOWS (Multi-Agent Routines)
# These replace BladeOS's cross-employee handoffs and routines
# =============================================================================

default_agent: "gary"

skill_repo: "~/marketingskills"
confidence_threshold: 0.05

workflows:
  # ===========================================================================
  # Original BladeOS: "Morning Briefing" (Chief of Staff routine)
  # New: Multi-agent intelligence gathering → Gary synthesizes and delivers
  # ===========================================================================
  morning_briefing:
    description: "Daily 6 AM executive briefing compiled from all agents"
    bladeos_equivalent: "Chief of Staff - Morning Briefing"
    steps:
      - agent: ron
        task: "Gather overnight intelligence: client health scores, competitor moves, market news. Return top 3 insights with data."
      - agent: blaze
        task: "Pull ad performance summary: yesterday's ROAS, spend, any critical alerts. Return quick metrics."
      - agent: codey
        task: "Check system health: any incidents, cost burn status, technical issues. Return health status."
      - agent: gary
        task: "Synthesize inputs from Ron, Blaze, and Codey into an executive morning briefing. Format as concise bullet points with action items."
    
  # ===========================================================================
  # Original BladeOS: "Client Health Check" (CSM routine)
  # New: Ron researches → Gary writes client communications
  # ===========================================================================
  client_health_check:
    description: "Comprehensive client account health analysis"
    bladeos_equivalent: "CSM Agent - Morning Health Check"
    steps:
      - agent: ron
        task: "Analyze all active client accounts. Pull metrics, compare to benchmarks, calculate health scores (0-100). Flag any account below 50."
      - agent: ron
        task: "For flagged accounts, research root causes: traffic drops, creative fatigue, tracking issues, competitive threats."
      - agent: gary
        task: "Draft proactive outreach emails for at-risk clients. Tone: concerned partner offering solutions, not alarmist."
      - agent: codey
        task: "For technical issues identified, implement fixes or create tickets."
    
  # ===========================================================================
  # Original BladeOS: "Weekly Financial Summary" (Finance Analyst routine)
  # New: Codey analyzes → Gary formats for leadership
  # ===========================================================================
  financial_review:
    description: "Weekly financial performance and runway analysis"
    bladeos_equivalent: "Finance Analyst - Weekly Financial Summary"
    steps:
      - agent: codey
        task: "Pull all cost data: API spend, infrastructure, agent costs. Calculate burn rate and runway. Compare to budget."
      - agent: ron
        task: "Research market context: any industry factors affecting financial projections."
      - agent: gary
        task: "Format financial summary for leadership. Highlight variances, trends, and recommended actions. Clear executive summary format."
    
  # ===========================================================================
  # Original BladeOS: "Weekly Funnel Review" (Growth Lead routine)
  # New: Full-funnel analysis across teams
  # ===========================================================================
  funnel_review:
    description: "Comprehensive marketing funnel analysis"
    bladeos_equivalent: "Growth Lead - Weekly Funnel Review"
    steps:
      - agent: patty
        task: "Analyze content performance: top videos, social engagement, community growth. Identify what's working."
      - agent: blaze
        task: "Review paid funnel: CAC, conversion rates, ROAS by campaign. Flag bottlenecks."
      - agent: ron
        task: "Research competitor funnel tactics. Any new strategies worth testing?"
      - agent: gary
        task: "Synthesize funnel insights into weekly report. Include specific recommendations for each funnel stage."
    
  # ===========================================================================
  # Original BladeOS: "PR Review Sweep" (Engineering Manager routine)
  # New: Codey handles engineering tasks
  # ===========================================================================
  engineering_review:
    description: "Code review and deploy health check"
    bladeos_equivalent: "Engineering Manager - PR Review Sweep"
    steps:
      - agent: codey
        task: "Review all open PRs. Check for stale PRs (>3 days), CI failures, merge conflicts."
      - agent: codey
        task: "Check recent deploy health: error rates, performance metrics, rollback status."
      - agent: codey
        task: "Calculate engineering KPIs: velocity, cycle time, review time."
      - agent: gary
        task: "Draft engineering update for team: what's shipping, what's blocked, action items."
    
  # ===========================================================================
  # Original BladeOS: Launch workflows / Cross-team coordination
  # ===========================================================================
  full_campaign_launch:
    description: "End-to-end campaign from research to live ads"
    bladeos_equivalent: "Cross-team campaign launch"
    steps:
      - agent: ron
        task: "Deep research: competitor ads, market positioning, customer pain points. Deliver 3 winning angles."
      - agent: patty
        task: "Develop creative concepts: hooks, visual direction, copy mood based on Ron's research."
      - agent: gary
        task: "Write all campaign copy: ad variations, landing page, email sequence. Test for clarity and CTAs."
      - agent: blaze
        task: "Build and launch Meta campaign: structure, audiences, creatives, tracking. Set up A/B tests."
      - agent: codey
        task: "Implement landing page, tracking pixels, attribution. Ensure technical stack is ready."
    
  # ===========================================================================
  # Original BladeOS: Content production workflow
  # ===========================================================================
  content_production:
    description: "Full content production from ideation to publication"
    bladeos_equivalent: "Growth Lead content coordination"
    steps:
      - agent: ron
        task: "Research trending topics, competitor content gaps, audience questions. Deliver content opportunities."
      - agent: patty
        task: "Create content strategy: calendar, scripts, hooks, thumbnails. Batch plan."
      - agent: gary
        task: "Write supporting copy: descriptions, social posts, email announcements."
      - agent: codey
        task: "Set up automation: scheduling, cross-posting, tracking. Build any needed tools."
    
  # ===========================================================================
  # Original BladeOS: System incident response (Ops Manager)
  # ===========================================================================
  incident_response:
    description: "Automated incident detection and response"
    bladeos_equivalent: "Ops Manager - Incident handling"
    steps:
      - agent: codey
        task: "Diagnose incident: check logs, metrics, recent changes. Identify root cause."
      - agent: codey
        task: "Implement immediate fix if possible. Document workaround if not."
      - agent: gary
        task: "Draft incident communication: what happened, impact, current status, next steps. Send to stakeholders."
      - agent: ron
        task: "Post-incident analysis: how to prevent recurrence, monitoring improvements needed."
